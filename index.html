<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GurukrupaTech - Guru AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar-container">
                <img src="swity-avatar.png" alt="Swity" class="avatar-img">
                <div class="status-indicator online"></div>
            </div>
            <div class="header-info">
                <h2>Swity (AI Assistant)</h2>
                <span class="status-text">Online</span>
            </div>
            <div class="header-actions">
                <button id="voice-toggle-btn" class="header-btn voice-on" title="Toggle Voice Reply">🔊</button>
                <button id="settings-btn" class="header-btn" title="Settings">⚙️</button>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            </div>

        <div class="chat-input-area">
            <textarea id="user-input" placeholder="Type your message here..." rows="1"></textarea>
            <div class="input-actions">
                <button id="mic-btn" class="mic-button" title="Speak">🎤</button>
                <button id="send-btn" class="send-button" title="Send">ASK</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>System Configuration</h3>
                <span class="close-modal" id="close-modal-x">&times;</span>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label for="setting-lang">Language</label>
                    <select id="setting-lang">
                        <option value="en-US" selected>English (EN)</option>
                        <option value="hi-IN">Hindi (HI)</option>
                        <option value="mr-IN">Marathi (MR)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="setting-speed">Voice Speed</label>
                    <select id="setting-speed">
                        <option value="0.7">Slow</option>
                        <option value="1.0" selected>Normal</option>
                        <option value="1.4">Fast</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="setting-theme">Theme</label>
                    <select id="setting-theme">
                        <option value="dark-theme" selected>Dark</option>
                        <option value="light-theme">Light</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button id="close-modal-btn" class="cyber-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
