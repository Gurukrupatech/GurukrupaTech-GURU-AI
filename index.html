<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GurukrupaTech - Guru AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050112;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
        }

        /* Avatar styling ani cropping */
        .avatar-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin-bottom: 25px;
            border-radius: 50%;
            overflow: hidden; /* Side panels kadhun taknyasathi */
            border: 4px solid #bc00dd;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            transition: 0.3s;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top; /* Chehryavr focus thevnyasathi */
        }

        /* Boltana face/ring movement sathi animation */
        .talking {
            animation: bounce 0.4s infinite alternate;
            border-color: #00f3ff;
            box-shadow: 0 0 30px #bc00dd;
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.04); }
        }

        /* Chat box design */
        .chat-container {
            width: 100%;
            background: rgba(15, 10, 36, 0.95);
            border: 2px solid #3d1b7c;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 25px rgba(188, 0, 221, 0.2);
        }

        .chat-header {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00f3ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-box {
            min-height: 80px;
            margin-bottom: 20px;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #bc00dd;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        /* Input ani button area */
        .input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #3d1b7c;
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        #user-input:focus {
            border-color: #00f3ff;
        }

        #ask-btn {
            background: linear-gradient(45deg, #bc00dd, #00f3ff);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        #ask-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="avatar-container" id="avatar-window">
            <img src="swity-avatar.png" alt="Swity AI" class="avatar" id="swity-avatar">
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <span>💬</span>
                <span>Swity (AI Assistant)</span>
            </div>
            
            <div class="chat-box">
                <div class="message-bubble" id="response-text">
                    Hello! BOSS 👋 I am Swity, your AI Assistant. How can I help you today?
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your message here...">
                <button id="ask-btn">ASK</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('ask-btn').addEventListener('click', startAIResponse);

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startAIResponse();
            }
        });

        function startAIResponse() {
            const userInput = document.getElementById('user-input').value;
            const responseText = document.getElementById('response-text');
            const avatarWindow = document.getElementById('avatar-window');

            if (userInput.trim() === "") return;

            const reply = "Me tumchi madat karnyassathi tayar ahe! Tumcha prashna mla samajla.";
            
            responseText.innerText = reply;
            document.getElementById('user-input').value = ""; 

            // Web Speech API built-in browser voice sathi
            const speech = new SpeechSynthesisUtterance();
            speech.text = reply;
            speech.lang = 'mr-IN'; 
            speech.rate = 1.0;

            // Swity boltana animation chalu krne
            speech.onstart = function() {
                avatarWindow.classList.add('talking');
            };

            // Bolne samplayvar animation thambavne
            speech.onend = function() {
                avatarWindow.classList.remove('talking');
            };

            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
