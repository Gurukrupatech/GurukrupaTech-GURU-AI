<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GurukrupaTech - Guru AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #03000a;
            /* सायबरपंक डिजिटल ग्लो आणि लाईट इफेक्ट्स */
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(0, 243, 255, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 50% 70%, rgba(188, 0, 221, 0.2) 0%, transparent 60%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* बॅकग्राउंड ॲनिमेटेड लाईट्स इफेक्ट */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: bg-move 20s linear infinite;
            z-index: 0;
        }

        @keyframes bg-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
        }

        /* ब्रँड हेडिंग */
        .brand-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #00f3ff, #bc00dd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .brand-subtitle {
            font-size: 1.1rem;
            color: #00f3ff;
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* ॲनिमेटेड वर्तुळ (Rotating Cyber Ring) */
        .avatar-outer-ring {
            position: relative;
            width: 260px;
            height: 260px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* फिरणारे निऑन सर्कल ॲनिमेशन */
        .cyber-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px dashed #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            animation: rotate-ring 12s linear infinite;
        }

        .cyber-circle-inner {
            position: absolute;
            width: 92%;
            height: 92%;
            border-radius: 50%;
            border: 2px double #bc00dd;
            box-shadow: 0 0 15px rgba(188, 0, 221, 0.4);
            animation: rotate-ring-reverse 8s linear infinite;
        }

        @keyframes rotate-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rotate-ring-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        .avatar-container {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 2;
            border: 3px solid #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        /* बोलतानाचे स्पेशल ॲनिमेटेड मूव्हमेंट */
        .talking .avatar-container {
            animation: pulse-avatar 0.5s infinite alternate;
            border-color: #00f3ff;
            box-shadow: 0 0 35px #00f3ff;
        }

        .talking .cyber-circle {
            animation: rotate-ring 2s linear infinite;
            border-color: #bc00dd;
        }

        @keyframes pulse-avatar {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* चॅट बॉक्स इंटरफेस */
        .chat-container {
            width: 100%;
            background: rgba(10, 6, 26, 0.85);
            border: 1.5px solid rgba(61, 27, 124, 0.6);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(188, 0, 221, 0.2);
            backdrop-filter: blur(10px);
        }

        /* टॉप बटन्स: व्हॉईस, सेटिंग, माईक */
        .top-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: #00f3ff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* लँग्वेज ड्रॉपडाऊन (सेटिंग) */
        .lang-select {
            background: #0a061a;
            color: #fff;
            border: 1px solid #bc00dd;
            padding: 4px 8px;
            border-radius: 10px;
            outline: none;
            font-size: 0.85rem;
        }

        .chat-box {
            min-height: 90px;
            margin-bottom: 15px;
        }

        .message-bubble {
            background: rgba(20, 15, 45, 0.6);
            padding: 16px;
            border-radius: 16px;
            border-left: 4.5px solid #bc00dd;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* इनपुट बॉक्स */
        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(5, 3, 15, 0.8);
            border: 1px solid #3d1b7c;
            border-radius: 14px;
            padding: 5px 10px;
            margin-bottom: 15px;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 5px;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        /* मोठे ASK बटन */
        #ask-btn {
            width: 100%;
            background: linear-gradient(90deg, #bc00dd, #00f3ff);
            color: white;
            border: none;
            padding: 14px 0;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(188, 0, 221, 0.4);
            transition: 0.3s;
        }

        #ask-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 243, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="brand-header">
            <div class="brand-title">GurukrupaTech</div>
            <div class="brand-subtitle">Guru AI</div>
        </div>

        <div class="avatar-outer-ring" id="avatar-window">
            <div class="cyber-circle"></div>
            <div class="cyber-circle-inner"></div>
            <div class="avatar-container">
                <img src="swity-avatar.png" alt="Swity AI" class="avatar">
            </div>
        </div>

        <div class="chat-container">
            <div class="top-action-bar">
                <button class="action-btn" id="voice-test-btn">🔊 Voice Test</button>
                <button class="action-btn" id="mic-btn">🎙️ Mic</button>
                <div>
                    ⚙️ <select class="lang-select" id="lang-selector">
                        <option value="mr-IN">मराठी</option>
                        <option value="hi-IN">Hindi</option>
                        <option value="en-US">English</option>
                    </select>
                </div>
            </div>
            
            <div class="chat-box">
                <div class="message-bubble" id="response-text">
                    Hello! BOSS 👋 I am Swity, your AI Assistant. How can I help you today?
                </div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message here...">
            </div>

            <button id="ask-btn">ASK</button>
        </div>
    </div>

    <script>
        const askBtn = document.getElementById('ask-btn');
        const voiceTestBtn = document.getElementById('voice-test-btn');
        const micBtn = document.getElementById('mic-btn');
        const langSelector = document.getElementById('lang-selector');
        const avatarWindow = document.getElementById('avatar-window');
        const responseText = document.getElementById('response-text');

        askBtn.addEventListener('click', startAIResponse);
        voiceTestBtn.addEventListener('click', () => speakOutput("Voice Engine Connected!"));

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') startAIResponse();
        });

        // स्पीच आणि ॲनिमेशन फंक्शन
        function speakOutput(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // जुने बोलणे थांबवा
                const speech = new SpeechSynthesisUtterance(text);
                speech.lang = langSelector.value; // सिलेक्ट केलेली भाषा लागू होईल
                speech.rate = 1.0;

                speech.onstart = () => avatarWindow.classList.add('talking');
                speech.onend = () => avatarWindow.classList.remove('talking');
                
                window.speechSynthesis.speak(speech);
            }
        }

        function startAIResponse() {
            const userInput = document.getElementById('user-input').value;
            if (userInput.trim() === "") return;

            // भाषेनुसार उत्तरे बदलण्यासाठी लॉजिक
            let reply = "";
            const selectedLang = langSelector.value;

            if (selectedLang === 'mr-IN') {
                reply = "मी तुमची मदत करण्यास तयार आहे! तुमचा प्रश्न मला समजला.";
            } else if (selectedLang === 'hi-IN') {
                reply = "मैं आपकी मदद करने के लिए तैयार हूँ! मुझे आपका सवाल समझ आ गया।";
            } else {
                reply = "I am ready to help you! I understood your question.";
            }
            
            responseText.innerText = reply;
            document.getElementById('user-input').value = ""; 

            speakOutput(reply);
        }

        // माईक (Speech to Text) फिचर
        if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();

            micBtn.addEventListener('click', () => {
                recognition.lang = langSelector.value;
                recognition.start();
                responseText.innerText = "Listening... 🎙️";
            });

            recognition.onresult = function(event) {
                const resultText = event.results[0][0].transcript;
                document.getElementById('user-input').value = resultText;
                startAIResponse();
            };
        } else {
            micBtn.style.display = 'none'; // सपोर्ट नसेल तर माईक लपवा
        }
    </script>
</body>
</html>
