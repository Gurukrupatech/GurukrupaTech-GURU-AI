<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GURU AI | GurukrupaTech</title>
    <style>
        :root {
            --bg-color: #05070d;
            --card-bg: rgba(13, 18, 30, 0.85);
            --border-color: rgba(0, 210, 255, 0.25);
            --primary: #00e5ff;
            --secondary: #e02498;
            --text-color: #ffffff;
            --text-dim: #7a8b9e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(224, 36, 152, 0.05) 0%, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 92vh;
            max-height: 820px;
        }

        header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .branding h1 {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: 1.5px;
        }

        .branding span {
            font-size: 0.72rem;
            color: var(--text-dim);
            font-weight: 600;
            display: block;
            margin-top: 2px;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        select, .btn-header {
            background: rgba(13, 22, 38, 0.8);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .btn-header {
            text-align: center;
            white-space: nowrap;
        }

        .avatar-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 35px 20px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.15);
        }

        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .avatar {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff 0%, #e02498 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.35rem;
            color: #ffffff;
            letter-spacing: 1px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
        }

        .listening .avatar {
            animation: pulse-ring 1.5s infinite;
        }

        .speaking .avatar, .talking .avatar {
            animation: bounce 0.4s infinite alternate, pulse-glow 0.4s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); }
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px var(--primary); }
            100% { box-shadow: 0 0 35px var(--secondary); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { transform: scale(1.08); box-shadow: 0 0 0 18px rgba(0, 229, 255, 0); }
            100% { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }

        .chat-box {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 0.92rem;
            line-height: 1.45;
            word-wrap: break-word;
            font-weight: 500;
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(65, 12, 50, 0.65);
            border: 1px solid rgba(224, 36, 152, 0.4);
            color: #ffffff;
            border-top-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(0, 100, 130, 0.45);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #ffffff;
            border-top-right-radius: 4px;
        }

        .input-area {
            padding: 14px 16px;
            display: flex;
            gap: 10px;
            background: rgba(9, 13, 22, 0.6);
            align-items: center;
        }

        .input-area input {
            flex: 1;
            background: rgba(10, 16, 28, 0.9);
            border: 1px solid rgba(0, 210, 255, 0.25);
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-color);
            outline: none;
            font-size: 0.9rem;
        }

        .input-area input::placeholder {
            color: var(--text-dim);
        }

        .input-area input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .btn-mic {
            background: rgba(10, 16, 28, 0.9);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: var(--text-color);
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .btn-mic.active {
            background: rgba(224, 36, 152, 0.4);
            border-color: var(--secondary);
            box-shadow: 0 0 12px rgba(224, 36, 152, 0.6);
        }

        footer {
            text-align: center;
            padding: 12px;
            font-size: 0.72rem;
            color: var(--text-dim);
            border-top: 1px solid rgba(0, 210, 255, 0.1);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="branding">
            <h1>GURU<br>AI</h1>
            <span>GurukrupaTech<br>| Trader Shiv</span>
        </div>
        <div class="controls">
            <select id="languageSelect">
                <option value="en-US">English (US)</option>
                <option value="hi-IN">Hindi</option>
                <option value="mr-IN">Marathi</option>
            </select>
            <button id="voiceTestBtn" class="btn-header" type="button">Voice<br>Test</button>
        </div>
    </header>

    <div class="avatar-section">
        <div class="avatar-container" id="avatarContainer">
            <div class="avatar">GURU</div>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hello! I am GURU AI by Trader Shiv. How can I assist you today?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
        <button id="voiceBtn" class="btn-mic" type="button" title="Voice Input">🎤</button>
    </div>

    <footer>
        &copy; GurukrupaTech - Powered by Trader Shiv
    </footer>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceTestBtn = document.getElementById('voiceTestBtn');
        const languageSelect = document.getElementById('languageSelect');
        const avatarContainer = document.getElementById('avatarContainer');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            try {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onstart = function() {
                    isListening = true;
                    if (voiceBtn) voiceBtn.classList.add('active');
                    if (avatarContainer) avatarContainer.classList.add('listening');
                };

                recognition.onresult = function(event) {
                    if (event.results && event.results[0] && event.results[0][0]) {
                        const transcript = event.results[0][0].transcript;
                        if (userInput) {
                            userInput.value = transcript;
                        }
                        handleSend();
                    }
                };

                recognition.onerror = function(event) {
                    console.warn('Speech recognition error:', event.error);
                    stopListening();
                };

                recognition.onend = function() {
                    stopListening();
                };
            } catch (e) {
                console.error("Speech recognition initialization error:", e);
            }
        } else {
            if (voiceBtn) voiceBtn.style.opacity = '0.5';
        }

        function startListening() {
            if (!recognition) {
                alert('Speech recognition is not supported on this device/browser.');
                return;
            }
            if (isListening) return;

            try {
                stopSpeech();
                recognition.lang = languageSelect ? languageSelect.value : 'en-US';
                recognition.start();
            } catch (e) {
                console.error('Error starting recognition:', e);
                stopListening();
            }
        }

        function stopListening() {
            isListening = false;
            if (voiceBtn) voiceBtn.classList.remove('active');
            if (avatarContainer) avatarContainer.classList.remove('listening');
            if (recognition) {
                try {
                    recognition.stop();
                } catch (e) {}
            }
        }

        if (voiceBtn) {
            voiceBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (isListening) {
                    stopListening();
                } else {
                    startListening();
                }
            });
        }

        function stopSpeech() {
            if ('speechSynthesis' in window) {
                try {
                    window.speechSynthesis.cancel();
                } catch(e) {}
            }
            if (avatarContainer) {
                avatarContainer.classList.remove('speaking');
                avatarContainer.classList.remove('talking');
            }
        }

        function speakText(text) {
            if (!('speechSynthesis' in window)) return;

            stopSpeech();

            try {
                const utterance = new SpeechSynthesisUtterance(text);
                const selectedLang = languageSelect ? languageSelect.value : 'en-US';
                utterance.lang = selectedLang;
                utterance.rate = 1.0;

                utterance.onstart = function() {
                    if (avatarContainer) {
                        avatarContainer.classList.add('speaking');
                        avatarContainer.classList.add('talking');
                    }
                };

                utterance.onend = function() {
                    if (avatarContainer) {
                        avatarContainer.classList.remove('speaking');
                        avatarContainer.classList.remove('talking');
                    }
                };

                utterance.onerror = function() {
                    if (avatarContainer) {
                        avatarContainer.classList.remove('speaking');
                        avatarContainer.classList.remove('talking');
                    }
                };

                window.speechSynthesis.speak(utterance);
            } catch (e) {
                console.error("Speech synthesis error:", e);
                if (avatarContainer) {
                    avatarContainer.classList.remove('speaking');
                    avatarContainer.classList.remove('talking');
                }
            }
        }

        function appendMessage(text, sender) {
            if (!chatBox) return;
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleSend() {
            if (!userInput) return;
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';

            setTimeout(() => {
                let responseText = "GURU AI process completed for: " + text;
                const lowerText = text.toLowerCase();
                const selectedLang = languageSelect ? languageSelect.value : 'en-US';

                if (selectedLang === 'mr-IN') {
                    responseText = "मी तुमची मदत करण्यास तयार आहे! तुम्ही विचारलेला प्रश्न मला समजला: " + text;
                } else if (lowerText.includes("hello") || lowerText.includes("hi")) {
                    responseText = "Welcome! GURU AI by Trader Shiv is at your service.";
                } else if (lowerText.includes("trader shiv")) {
                    responseText = "Trader Shiv provides high-tech trading and automation solutions with GurukrupaTech.";
                }

                appendMessage(responseText, 'bot');
                speakText(responseText);
            }, 400);
        }

        if (userInput) {
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSend();
                }
            });
        }

        if (voiceTestBtn) {
            voiceTestBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const selectedLang = languageSelect ? languageSelect.value : 'en-US';
                let testMsg = "Voice test successful. GURU AI audio system is online.";
                if (selectedLang === 'mr-IN') {
                    testMsg = "आवाज चाचणी यशस्वी झाली. गुरु एआय सिस्टीम तयार आहे.";
                } else if (selectedLang === 'hi-IN') {
                    testMsg = "वॉइस टेस्ट सफल रहा। गुरु एआई ऑडियो सिस्टम चालू है।";
                }
                speakText(testMsg);
            });
        }
    });
</script>
</body>
</html>
