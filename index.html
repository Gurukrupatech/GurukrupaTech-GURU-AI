<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GURUKRUPATECH - GURU AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="cyberpunk-bg"></div>
  <div class="neon-particles-bg"></div>

  <div class="app-container">

    <div class="circuit-border top-left"></div>
    <div class="circuit-border top-right"></div>
    <div class="circuit-border bottom-left"></div>
    <div class="circuit-border bottom-right"></div>

    <header class="app-header">
      <button class="icon-btn header-btn" id="menu-btn" aria-label="Menu">
        <i class="fa-solid fa-bars"></i>
      </button>

      <div class="header-branding">
        <span class="company-name">GURUKRUPATECH</span>
        <div class="logo-wrapper">
          <img src="guru-ai-logo.png" alt="GURU AI Logo" class="guru-logo">
        </div>
        <span class="badge">TRADER SHIV</span>
      </div>

      <button class="icon-btn header-btn" id="header-settings-btn" aria-label="Settings">
        <i class="fa-solid fa-gear"></i>
      </button>
    </header>

    <div class="top-controls">
      <button class="top-btn" id="top-mic-btn">
        <i class="fa-solid fa-microphone"></i>
        <span>MIC</span>
      </button>

      <button class="top-btn" id="top-voice-btn">
        <i class="fa-solid fa-volume-high"></i>
        <span>VOICE</span>
      </button>
    </div>

    <section class="avatar-section">
      <div class="avatar-container" id="avatar-container">
        <img src="neon-orbit-ring.png" alt="Neon Orbit Ring" class="neon-ring-img outer">
        <div class="ring middle-ring"></div>
        <div class="ring inner-ring"></div>
        
        <div class="avatar-wrapper">
          <img src="swity-avatar.png" alt="Swity AI Avatar" id="avatar-img" class="avatar-img">
          <div class="avatar-glow-overlay"></div>
        </div>
      </div>

      <div class="assistant-info">
        <h2 class="assistant-name">Swity AI Assistant</h2>
        <p class="assistant-subtitle">Your Personal AI Companion</p>
      </div>
    </section>

    <section class="hud-panel-frame">
      <img src="hud-panel.png" alt="HUD Panel" class="hud-panel-overlay">
      <img src="holographic-globe.png" alt="Holographic Globe" class="globe-bg">

      <div class="chat-container" id="chat-container">
        <div class="chat-messages" id="chat-messages">
          <div class="message bot-message">
            <div class="message-avatar">
              <img src="swity-avatar.png" alt="Swity">
            </div>
            <div class="message-content">
              <p>Hello! Main Swity hoon. Aaj main aapki kya sahayata kar sakti hoon?</p>
              <span class="timestamp" id="initial-time">04:35 PM</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="input-container">
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off">
        <button id="send-btn" class="send-btn" aria-label="Send">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <nav class="bottom-nav">
      <button class="nav-btn" id="bottom-mic-btn">
        <i class="fa-solid fa-microphone"></i>
        <span>MIC</span>
      </button>

      <button class="nav-btn" id="bottom-settings-btn">
        <i class="fa-solid fa-sliders"></i>
        <span>SETTINGS</span>
      </button>

      <button class="nav-btn" id="bottom-voice-btn">
        <i class="fa-solid fa-volume-high"></i>
        <span>VOICE</span>
      </button>
    </nav>

  </div>

  <div class="modal-overlay" id="settings-modal">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h3>System Settings</h3>
        <button class="close-btn" id="close-settings"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="language-select"><i class="fa-solid fa-globe"></i> Assistant Language</label>
          <select id="language-select" class="custom-select">
            <option value="en-US">English</option>
            <option value="hi-IN">Hindi (हिंदी)</option>
            <option value="mr-IN">Marathi (मराठी)</option>
          </select>
        </div>

        <div class="setting-group">
          <label for="speech-rate"><i class="fa-solid fa-gauge-high"></i> Voice Speed</label>
          <input type="range" id="speech-rate" min="0.5" max="1.5" step="0.1" value="1.0">
        </div>

        <div class="setting-group toggle-group">
          <span><i class="fa-solid fa-comment-dots"></i> Auto Voice Output</span>
          <label class="switch">
            <input type="checkbox" id="auto-voice-toggle" checked>
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
