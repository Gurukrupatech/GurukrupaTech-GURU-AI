<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GURU AI | GurukrupaTech</title>
    <style>
        :root {
            --bg-color: #0d0f18;
            --card-bg: rgba(22, 27, 46, 0.65);
            --border-color: rgba(0, 240, 255, 0.2);
            --primary: #00f0ff;
            --secondary: #ff007f;
            --text-color: #e0e6ed;
            --text-dim: #8a99ad;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.08) 0%, transparent 40%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 0 0 15px rgba(0, 240, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }

        header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 15, 24, 0.4);
        }

        .branding {
            display: flex;
            flex-direction: column;
        }

        .branding h1 {
            font-size: 1.4rem;
            color: var(--primary);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
            letter-spacing: 1px;
        }

        .branding span {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            font-size: 0.85rem;
        }

        select option {
            background: #161b2e;
            color: var(--text-color);
        }

        button:hover {
            background: rgba(0, 240, 255, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            border-bottom: 1px solid var(--border-color);
        }

        .avatar-container {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            z-index: 2;
        }

        .avatar-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        /* Listening Animation */
        .listening .avatar-ring {
            border-color: var(--primary);
            animation: pulse-ring 1.5s infinite;
        }

        /* Speaking Animation */
        .speaking .avatar-ring {
            border-color: var(--secondary);
            animation: speak-ring 0.8s infinite alternate;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); }
            70% { transform: scale(1.15); opacity: 0; box-shadow: 0 0 0 15px rgba(0, 240, 255, 0); }
            100% { transform: scale(0.95); opacity: 0; }
        }

        @keyframes speak-ring {
            0% { transform: scale(1); box-shadow: 0 0 5px var(--secondary); }
            100% { transform: scale(1.1); box-shadow: 0 0 20px var(--secondary); }
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(255, 0, 127, 0.15);
            border: 1px solid rgba(255, 0, 127, 0.3);
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            background: rgba(13, 15, 24, 0.4);
        }

        .input-area input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            font-size: 0.95rem;
        }

        .input-area input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
        }

        .btn-voice.active {
            background: rgba(255, 0, 127, 0.3);
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        footer {
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            color: var(--text-dim);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="branding">
            <h1>GURU AI</h1>
            <span>GurukrupaTech | Trader Shiv</span>
        </div>
        <div class="controls">
            <select id="languageSelect">
                <option value="en-US">English (US)</option>
                <option value="hi-IN">Hindi</option>
            </select>
            <button id="voiceTestBtn">Voice Test</button>
        </div>
    </header>

    <div class="avatar-section">
        <div class="avatar-container" id="avatarContainer">
            <div class="avatar-ring"></div>
            <div class="avatar">GURU</div>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hello! I am GURU AI by Trader Shiv. How can I assist you today?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
        <button id="voiceBtn" class="btn-voice" title="Voice Input">🎤</button>
        <button id="askBtn">ASK</button>
    </div>

    <footer>
        &copy; GurukrupaTech - Powered by Trader Shiv
    </footer>
</div>

<script>
    // Safe DOM Element References
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const askBtn = document.getElementById('askBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceTestBtn = document.getElementById('voiceTestBtn');
    const languageSelect = document.getElementById('languageSelect');
    const avatarContainer = document.getElementById('avatarContainer');

    // Speech Recognition Initialization
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = function() {
            isListening = true;
            if (voiceBtn) voiceBtn.classList.add('active');
            if (avatarContainer) avatarContainer.classList.add('listening');
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            if (userInput) {
                userInput.value = transcript;
            }
            handleSend();
        };

        recognition.onerror = function(event) {
            console.warn('Speech recognition error:', event.error);
            stopListening();
        };

        recognition.onend = function() {
            stopListening();
        };
    } else {
        if (voiceBtn) voiceBtn.style.display = 'none';
        console.warn('Speech Recognition is not supported in this browser.');
    }

    function startListening() {
        if (!recognition || isListening) return;
        try {
            stopSpeech(); // Stop speech before starting recognition to avoid loop/feedback
            recognition.lang = languageSelect ? languageSelect.value : 'en-US';
            recognition.start();
        } catch (e) {
            console.error('Error starting recognition:', e);
            stopListening();
        }
    }

    function stopListening() {
        isListening = false;
        if (voiceBtn) voiceBtn.classList.remove('active');
        if (avatarContainer) avatarContainer.classList.remove('listening');
        if (recognition) {
            try {
                recognition.stop();
            } catch (e) {}
        }
    }

    // Toggle Voice Input safely
    if (voiceBtn) {
        voiceBtn.addEventListener('click', () => {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        });
    }

    // Speech Synthesis Management
    function stopSpeech() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
        if (avatarContainer) avatarContainer.classList.remove('speaking');
    }

    function speakText(text) {
        if (!('speechSynthesis' in window)) return;

        stopSpeech(); // Prevent TTS overlap

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = languageSelect ? languageSelect.value : 'en-US';

        utterance.onstart = function() {
            if (avatarContainer) avatarContainer.classList.add('speaking');
        };

        utterance.onend = function() {
            if (avatarContainer) avatarContainer.classList.remove('speaking');
        };

        utterance.onerror = function() {
            if (avatarContainer) avatarContainer.classList.remove('speaking');
        };

        window.speechSynthesis.speak(utterance);
    }

    // Chat Logic
    function appendMessage(text, sender) {
        if (!chatBox) return;
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleSend() {
        if (!userInput) return;
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        // Response handling
        setTimeout(() => {
            let responseText = "GURU AI process completed for: " + text;
            if (text.toLowerCase().includes("hello") || text.toLowerCase().includes("hi")) {
                responseText = "Welcome! GURU AI by Trader Shiv is at your service.";
            } else if (text.toLowerCase().includes("trader shiv")) {
                responseText = "Trader Shiv provides high-tech trading and automation solutions with GurukrupaTech.";
            }
            appendMessage(responseText, 'bot');
            speakText(responseText);
        }, 400);
    }

    // Event Listeners
    if (askBtn) askBtn.addEventListener('click', handleSend);

    if (userInput) {
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSend();
            }
        });
    }

    if (voiceTestBtn) {
        voiceTestBtn.addEventListener('click', () => {
            const testMsg = "Voice test successful. GURU AI audio system is online.";
            speakText(testMsg);
        });
    }
</script>
</body>
</html>
