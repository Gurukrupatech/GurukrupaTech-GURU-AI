<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GurukrupaTech - Guru AI</title>
    <link rel="stylesheet" href="script.css">
</head>
<body>

    <div class="main-container">
        <div class="avatar-container">
            <div class="glow-ring"></div>
            <img src="57995.png" alt="Swity AI" id="swity-avatar" class="avatar">
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <span class="chat-icon">💬</span>
                <span>Swity (AI Assistant)</span>
            </div>
            
            <div class="chat-box">
                <div class="message-bubble" id="response-text">
                    Hello! BOSS 👋 I am Swity, your AI Assistant. How can I help you today?
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your message here...">
                <button id="ask-btn">ASK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
